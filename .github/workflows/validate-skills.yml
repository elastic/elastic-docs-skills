name: Validate Skills

on:
  push:
    branches: [main]
    paths: ['skills/**']
  pull_request:
    paths: ['skills/**']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Validate skills
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate skills
        shell: bash
        run: |
          errors=0

          # Validate SKILL.md frontmatter (required keys, semver, unique names).
          if ! python3 - <<'PY'
          import re
          from pathlib import Path

          root = Path("skills")
          semver_re = re.compile(r"^\d+\.\d+\.\d+$")
          kebab_re = re.compile(r"^[a-z0-9]+(?:-[a-z0-9]+)*$")

          errors = []
          names = {}

          for skill_md in sorted(root.glob("*/*/SKILL.md")):
              text = skill_md.read_text()
              match = re.match(r"^---\n(.+?)\n---", text, re.DOTALL)
              if not match:
                  errors.append(f"{skill_md}: missing YAML frontmatter")
                  continue

              fields = {}
              for line in match.group(1).splitlines():
                  if ":" not in line or line.startswith("  - "):
                      continue
                  key, _, val = line.partition(":")
                  fields[key.strip()] = val.strip()

              for key in ("name", "description", "version"):
                  if not fields.get(key):
                      errors.append(f"{skill_md}: missing required field '{key}'")

              name = fields.get("name", "")
              if name:
                  if not kebab_re.match(name):
                      errors.append(f"{skill_md}: name '{name}' must be kebab-case")
                  if not name.startswith("docs-"):
                      errors.append(f"{skill_md}: name '{name}' must start with 'docs-'")
                  names.setdefault(name, []).append(str(skill_md))

              version = fields.get("version", "")
              if version and not semver_re.match(version):
                  errors.append(f"{skill_md}: version '{version}' must be SemVer (MAJOR.MINOR.PATCH)")

          for name, paths in sorted(names.items()):
              if len(paths) > 1:
                  errors.append(f"Duplicate skill name '{name}' in: {', '.join(paths)}")

          for e in errors:
              print(f"::error::{e}")

          print(f"Validated {len(list(root.glob('*/*/SKILL.md')))} skills.")
          if errors:
              raise SystemExit(1)
          PY
          then
            ((errors++))
          fi

          # Validate eval files
          while IFS= read -r eval_file; do
            echo "Checking $eval_file..."

            # Validate JSON syntax
            if ! python3 -m json.tool "$eval_file" > /dev/null 2>&1; then
              echo "::error file=$eval_file::Invalid JSON"
              ((errors++))
              continue
            fi

            # Validate required structure
            valid=$(python3 -c "
          import json, sys
          with open('$eval_file') as f:
              data = json.load(f)
          if 'evals' not in data:
              print('missing_evals'); sys.exit()
          for i, e in enumerate(data['evals']):
              for field in ['id', 'prompt', 'expectations']:
                  if field not in e:
                      print(f'eval[{i}]_missing_{field}'); sys.exit()
              if not isinstance(e['expectations'], list) or len(e['expectations']) == 0:
                  print(f'eval[{i}]_empty_expectations'); sys.exit()
          print('ok')
          " 2>&1)

            if [[ "$valid" == "ok" ]]; then
              echo "  ✓ Valid"
            elif [[ "$valid" == "missing_evals" ]]; then
              echo "::error file=$eval_file::Missing required 'evals' array"
              ((errors++))
            else
              echo "::error file=$eval_file::Invalid eval structure: $valid"
              ((errors++))
            fi

          done < <(find skills -name "evals.json" -type f 2>/dev/null | sort)

          if [[ $errors -gt 0 ]]; then
            echo ""
            echo "Found $errors validation error(s)"
            exit 1
          fi

          # On PRs: require .claude-plugin/plugin.json to be edited when skills change
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            if ! git diff --name-only "origin/${{ github.base_ref }}...HEAD" | grep -q "^\.claude-plugin/plugin\.json$"; then
              echo "::error file=.claude-plugin/plugin.json::Skills changed but .claude-plugin/plugin.json was not updated. Please bump the version field in .claude-plugin/plugin.json before merging."
              ((errors++))
            else
              echo ".claude-plugin/plugin.json updated ✓"
            fi
          fi

          if [[ $errors -gt 0 ]]; then
            echo ""
            echo "Found $errors validation error(s)"
            exit 1
          fi

          echo ""
          echo "All skills and evals validated successfully"
